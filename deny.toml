# cargo-deny configuration
# Protects PolyForm Noncommercial licensing

[advisories]
version = 2
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8

# Only permissive licenses for dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

# Denied by omission: GPL, AGPL, LGPL, SSPL, proprietary, unknown

# Catenary crates use PolyForm Noncommercial (not in SPDX registry)
exceptions = [
    { name = "catenary-mcp", allow = ["PolyForm-Noncommercial-1.0.0"] },
    { name = "catenary-proc", allow = ["PolyForm-Noncommercial-1.0.0"] },
    { name = "catenary-ts", allow = ["PolyForm-Noncommercial-1.0.0"] },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
