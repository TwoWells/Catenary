name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mdBook
        run: |
          TAG=$(gh release view --repo rust-lang/mdBook --json tagName -q .tagName)
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${TAG}/mdbook-${TAG}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare site directory
        run: mkdir -p site/stable site/dev

      - name: Build stable docs (latest tag)
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          echo "Building stable docs from $LATEST_TAG"
          git checkout "$LATEST_TAG" -- docs/
          mdbook build docs
          cp -r docs/book/* site/stable/
          git checkout HEAD -- docs/

      - name: Build dev docs (current ref)
        run: |
          cat > docs/src/dev-banner.css <<'CSS'
          .dev-banner {
            background: #d97706;
            color: #fff;
            text-align: center;
            padding: 0.5em;
            font-size: 0.9em;
            position: sticky;
            top: 0;
            z-index: 1000;
          }
          .dev-banner a { color: #fff; text-decoration: underline; }
          CSS
          cat > docs/src/dev-banner.js <<'JS'
          (function() {
            var banner = document.createElement('div');
            banner.className = 'dev-banner';
            banner.innerHTML = 'You are reading unreleased documentation. <a href="/stable/">Click here for the latest release.</a>';
            document.body.prepend(banner);
          })();
          JS
          cat >> docs/book.toml <<'TOML'
          additional-css = ["src/dev-banner.css"]
          additional-js = ["src/dev-banner.js"]
          TOML
          mdbook build docs
          cp -r docs/book/* site/dev/
          git checkout HEAD -- docs/book.toml
          rm -f docs/src/dev-banner.css docs/src/dev-banner.js

      - name: Create root redirect
        run: |
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=stable/"></head>
            <body><a href="stable/">Redirecting to stable docs…</a></body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
